[package]
name = "hob"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
atomic_refcell = "0.1.10"
tokio = { version = "1.20.1", features = ["full"] }
rust-raknet = "0.12.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
yaml-rust = "0.4.5"
base64 = "0.21.4"
flate2 = "1.0.27"
p384 = { version = "0.13.0", features = [ "ecdsa", "std", "pkcs8" ] }
hmac-sha512 = { version = "1.1.4", features = [ "traits010", "sha384" ] }
hmac-sha256 = { version = "1.1.6", features = [ "traits010" ] }
aes = "0.8.3"
ctr = "0.9.2"
rand = "0.8.5"
protodef = { git = "https://github.com/ueno-aki/protodef/", rev = "8ad6dffd15eb8e94d0c4ecb5f1f040dd16190912" }
from-num = { git = "https://github.com/ueno-aki/from-num/", rev = "3b40c10c8ead6fa36a061081d986b119f708c10c" }
anyhow = "1.0.69"
thiserror = "1.0"
specs = "*"